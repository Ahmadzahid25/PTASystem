name: Deploy PTASystem

on:
  push:
    branches:
      - main  # This triggers the action when code is pushed to the main branch.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Check out the repository code
    - name: Checkout code
      uses: actions/checkout@v2

    # Set up Node.js (if you're working with a Node.js project)
    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'  # Specify the version of Node.js you want.

    # Install dependencies
    - name: Install dependencies
      run: npm install

    # Run tests (if you have any)
    - name: Run tests
      run: npm test

    # Build your project (adjust this step to suit your project build process)
    - name: Build project
      run: npm run build  # Or your custom build command

    # Ensure you're up to date with the latest remote changes
    - name: Pull latest changes
      run: git pull origin main

    # Deploy to a server or hosting service (this is an example with GitHub Pages)
    - name: Deploy to GitHub Pages
      run: |
        git config --global user.email "ahmadzahid482@gmail.com" 
        git config --global user.name "Ahmadzahid25" 
        git remote set-url origin https://github.com/Ahmadzahid25/PTASystem.git
        git add .
        git commit -m "Deploy project"
        git push origin main
